  int32 ep = 1;
  repeated EventCollectionItem item = 2;
}

message EventCollectionItem {
  int32 item_id = 1;
  int32 quantity = 2;
}

message Currency {
  int32 free_coin = 1;
  int32 pay_coin = 2;
  int32 total_coin = 3;
}

message OtherUser {
  int32 uid = 1;
  string name = 2;
  string comment = 3;
  int32 card_id = 4;
  int32 card_level = 5;
  int32 active_skill_level = 6;
  string last_access_date = 7;
  Follow following = 8;
  int32 message_ = 9;
  int32 level = 10;
}

message OtherUserList {
  repeated OtherUser list = 1;
}

message Profile {
  int32 uid = 1;
  string name = 2;
  int32 birthday = 3;
  string constellation = 4;
  string comment = 5;
  int32 following = 6;
  ProfileCard other_leader = 7;
  ProfileCard owner_leader = 8;
  int32 friendship = 9;
  repeated ProfileUnit unit = 10;
}

message ProfileUnit {
  int32 idx = 1;
  ProfileCard card = 2;
}

message ProfileCard {
  int32 id = 1;
  int32 level = 2;
  int32 active_skill_level = 3;
}

message Quest {
  repeated Chapter chapters = 1;
  repeated Stage stages = 2;
}

