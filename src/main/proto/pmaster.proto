message Puzzle {
  int32 id = 1;
  repeated PuzzleCell cells = 2;
  repeated PuzzleMission missions = 3;
  repeated PuzzleStageEvent stage_events = 4;
  int32 limit_type = 5;
  int32 limit_count = 6;
  bool use_full_count = 7;
}

message PuzzleCollection {
  map<int32, PuzzleComposition> compositions = 1;
  PuzzleComponent components = 2;
}

message PuzzleComposition {
  string cell_idxes = 1;
  repeated int32 mission_idxes = 2 [packed=true];
  repeated int32 stage_event_idxes = 3 [packed=true];
  int32 condition_idx = 4;
}

message PuzzleComponent {
  repeated PuzzleCell cells = 1;
  repeated PuzzleMission missions = 2;
  repeated PuzzleStageEvent stage_events = 3;
  repeated PuzzleCondition conditions = 4;
}

message PuzzleCell {
  int32 cell_type = 1;
  int32 color_type = 2;
  int32 param1 = 3;
  int32 param2 = 4;
  int32 param3 = 5;
  int32 left = 6;
  int32 right = 7;
  int32 up = 8;
  int32 down = 9;
  int32 bg_type = 10;
  int32 bg_param1 = 11;
  int32 bg_param2 = 12;
  int32 bg_param3 = 13;
}

message PuzzleMission {
  int32 mission_type = 1;
  int32 mission_value = 2;
}

message PuzzleStageEvent {
  int32 term = 1;
  int32 time = 2;
  int32 type = 3;
  int32 term_param1 = 4;
  int32 term_param2 = 5;
  int32 term_param3 = 6;
  int32 term_param4 = 7;
  int32 term_param5 = 8;
  int32 term_param6 = 9;
  int32 term_param7 = 10;
}

message PuzzleCondition {
  int32 limit_type = 1;
  int32 limit_count = 2;
  bool use_full_count = 3;
}

message Reaction {
  map<int32, ReactionCharacter> scene = 1;
  map<int32, ReactionCharacter> clothes = 2;
}

message ReactionCharacter {
  map<int32, ReactionCharacterData> data = 1;
}

message ReactionLineData {
  int32 facial = 1;
  int32 motion = 2;
  int32 voice = 3;
  string text = 4;
}

message ReactionCharacterData {
  repeated ReactionLineData reaction1 = 1;
  repeated ReactionLineData reaction2 = 2;
}

message TextMap {
  map<int32, string> map_ = 1;
}

message TextMapCollection {
  map<string, TextMap> collection = 1;
}

